<script>
/**
 * CONFIG: adapte uniquement les IDs ici (je ne touche pas à ton HTML).
 */
const els = {
  baseUrl: document.getElementById("baseUrl"), // input: https://ton-site.netlify.app
  interactions: document.getElementById("interactionsUrl"), // input URL du point de terminaison
  roleVerify: document.getElementById("roleVerifyUrl"), // input URL de vérification des rôles liés
  terms: document.getElementById("termsUrl"), // input URL des Conditions d'Utilisation
  privacy: document.getElementById("privacyUrl"), // input URL Politique de Confidentialité

  // boutons optionnels (si tu en as)
  btnGenerate: document.getElementById("btnGenerate"),
  btnCopyAll: document.getElementById("btnCopyAll"),
  btnOpenAll: document.getElementById("btnOpenAll"),
};

function normalizeBaseUrl(raw) {
  if (!raw) return "";
  let u = raw.trim();
  // enlève trailing slash
  u = u.replace(/\/+$/, "");
  return u;
}

function isHttpsUrl(value) {
  try {
    const u = new URL(value);
    return u.protocol === "https:";
  } catch {
    return false;
  }
}

function setInputValue(input, value) {
  if (!input) return;
  input.value = value;
  // feedback visuel simple
  input.style.outline = isHttpsUrl(value) ? "2px solid #22c55e" : "2px solid #ef4444";
}

function generateUrls() {
  const base = normalizeBaseUrl(els.baseUrl?.value || "");
  if (!base) return;

  // ✅ adapte ces paths si tu as des endpoints différents
  const interactions = `${base}/api/interactions`;
  const roleVerify = `${base}/verify-user`;
  const terms = `${base}/terms-of-service`;
  const privacy = `${base}/privacy-policy`;

  setInputValue(els.interactions, interactions);
  setInputValue(els.roleVerify, roleVerify);
  setInputValue(els.terms, terms);
  setInputValue(els.privacy, privacy);

  saveToLocalStorage();
}

async function copyToClipboard(text) {
  await navigator.clipboard.writeText(text);
}

async function copyAll() {
  const lines = [
    els.interactions?.value,
    els.roleVerify?.value,
    els.terms?.value,
    els.privacy?.value,
  ].filter(Boolean);

  if (!lines.length) return;
  await copyToClipboard(lines.join("\n"));
}

function openAll() {
  const urls = [
    els.interactions?.value,
    els.roleVerify?.value,
    els.terms?.value,
    els.privacy?.value,
  ].filter(Boolean);

  // ouvre en onglets (peut être bloqué si pas déclenché par un click utilisateur)
  for (const u of urls) {
    if (isHttpsUrl(u)) window.open(u, "_blank", "noopener,noreferrer");
  }
}

function saveToLocalStorage() {
  const data = {
    baseUrl: els.baseUrl?.value || "",
    interactions: els.interactions?.value || "",
    roleVerify: els.roleVerify?.value || "",
    terms: els.terms?.value || "",
    privacy: els.privacy?.value || "",
  };
  localStorage.setItem("discordUrlsConfig", JSON.stringify(data));
}

function loadFromLocalStorage() {
  const raw = localStorage.getItem("discordUrlsConfig");
  if (!raw) return;
  try {
    const d = JSON.parse(raw);
    if (els.baseUrl && d.baseUrl) els.baseUrl.value = d.baseUrl;
    if (els.interactions && d.interactions) els.interactions.value = d.interactions;
    if (els.roleVerify && d.roleVerify) els.roleVerify.value = d.roleVerify;
    if (els.terms && d.terms) els.terms.value = d.terms;
    if (els.privacy && d.privacy) els.privacy.value = d.privacy;
  } catch {}
}

/**
 * WIRE EVENTS
 */
function wire() {
  loadFromLocalStorage();

  // Génère automatiquement quand tu quittes le champ baseUrl
  els.baseUrl?.addEventListener("blur", generateUrls);

  // Sauvegarde auto si tu modifies manuellement une URL
  [els.baseUrl, els.interactions, els.roleVerify, els.terms, els.privacy]
    .filter(Boolean)
    .forEach((el) => el.addEventListener("input", saveToLocalStorage));

  // Boutons optionnels
  els.btnGenerate?.addEventListener("click", generateUrls);
  els.btnCopyAll?.addEventListener("click", copyAll);
  els.btnOpenAll?.addEventListener("click", openAll);
}

document.addEventListener("DOMContentLoaded", wire);
</script>
